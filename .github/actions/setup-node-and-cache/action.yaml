name: Setup Node and Cache
description: Install Nodejs and PNPM,configure cache and install dependencies

inputs:
    node-version:
        required: true
        type: string
    pnpm-version:
        required: true
        type: string

runs:
    using: "composite"
    steps:
        - name: Setup Pnpm
          uses: pnpm/action-setup@v3
          with:
              version: ${{ inputs.pnpm-version }}
              standalone: true
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
              node-version: ${{ inputs.node-version }}
              cache: pnpm
              cache-dependency-path: "pnpm-lock.yaml"
        - name: Install dependencies
          run: pnpm install
          shell: bash
