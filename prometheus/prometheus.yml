global:
    scrape_interval: 30s

scrape_configs:
    - job_name: "notification-service"
      metrics_path: /metrics

      static_configs:
          - targets:
                - notification-service:3001
    - job_name: "event-service"
      metrics_path: /metrics

      static_configs:
          - targets:
                - event-service:3002
    - job_name: "booking-service"
      metrics_path: /metrics

      static_configs:
          - targets:
                - booking-service:3003
